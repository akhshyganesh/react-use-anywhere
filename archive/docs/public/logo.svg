<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3eaf7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#grad1)" stroke="white" stroke-width="2"/>
  
  <!-- React-like atomic symbol -->
  <g transform="translate(60,60)">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="4" fill="white"/>
    
    <!-- Orbital rings -->
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="white" stroke-width="2" opacity="0.8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="white" stroke-width="2" opacity="0.8" transform="rotate(120)"/>
    
    <!-- Electrons -->
    <circle cx="25" cy="0" r="2" fill="white"/>
    <circle cx="-12.5" cy="21.7" r="2" fill="white"/>
    <circle cx="-12.5" cy="-21.7" r="2" fill="white"/>
  </g>
  
  <!-- Hook symbol -->
  <path d="M 75 35 Q 85 25 95 35 Q 95 45 85 45 Q 80 45 80 40" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Connection lines -->
  <path d="M 60 25 L 75 35" stroke="white" stroke-width="1" opacity="0.6"/>
  <path d="M 60 95 L 45 85" stroke="white" stroke-width="1" opacity="0.6"/>
  <path d="M 25 60 L 35 50" stroke="white" stroke-width="1" opacity="0.6"/>
  
  <!-- Service nodes -->
  <circle cx="25" cy="25" r="3" fill="white" opacity="0.8"/>
  <circle cx="95" cy="95" r="3" fill="white" opacity="0.8"/>
  <circle cx="25" cy="95" r="3" fill="white" opacity="0.8"/>
</svg>
